apiVersion: v1
kind: Service
metadata:
  name: spring-git-jenkins-service
spec:
  type: NodePort
  selector:
    app: spring-git-jenkins-docker
  ports:
    - port: 80           # Access via Service IP
      targetPort: 8080    # Matches Spring Boot port
      nodePort: 30007     # Access via http://localhost:30007 (in Minikube)